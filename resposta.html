<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            /* lagura */
            width: 400px;
            /* Altura */
            height: 200px;
            /* Para unir as linhas entre as celulas */
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            padding: 8px;
            /* Alinhamento horizontal 
                - center - centro
                - left - esquerda
                - right - direita
            */
            text-align: center;
            /* Alinhamento vertical
                - top - em cima
                - bottom - em baixo
                - middle - no centro
            */
            vertical-align: middle;
        }
        .tr {
            width: 400px;
            /* Altura */
            height: 200px;
            }
        .esquerda {
            text-align: left;
        }
        .centro {
            text-align: center;
        }
        .direita {
            text-align: right;
        }
        .topovert {
            vertical-align: top;
        }
        .centrovert {
            vertical-align: middle;
        }
        .baixovert {
            vertical-align: bottom;

        } 


    </style>
</head>
<body>
    <h1>Minha primeira tabela com alinhamento</h1>
    <table>
        <tr> <!-- Primeira linha -->
            <td class="esquerda">A1<br>(esquerda)</td>
            <td class="centro">B1<br>(padrão centro)</td>
            <td class="direita">C1<br>(direita)</td>
        </tr> <!-- Segunda linha -->
        <tr class="tr">
            <td class="topovert">A2<br>(topo)</td>
            <td class="centrovert">B2<br>(padrão) </td>
            <td class="baixovert">C2<br>(baixo)</td>
        </tr>
        <tr class="tr"> <!-- Terceira linha -->
            <td class="topovert">A3<br>(topo)</td>
            <td class="baixovert">B3<br>(baixo)</td>
            <td class="centrovert">C3<br>(padrão)</td>
        </tr>
        <tr> <!-- Quarta linha -->
            <td>A4</td>
            <td class="direita">1000<br>(número à direita)</td>
            <td>C4</td>
        </tr>

    </table>
    
</body>
</html>
